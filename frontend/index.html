<!DOCTYPE html>
<html>
<head>
  <title>Lipid Electrophoresis Classifier</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Lipid Electrophoresis Classifier</h1>

  <section>
    <h2>Upload scan</h2>
    <input type="file" id="scanInput" accept="image/*" capture="environment">
    <button onclick="uploadOne()">Upload scan</button>
  </section>

  <section>
    <h2>Biochemistry values</h2>
  
    <label>Total cholesterol mmol/L</label>
    <input type="number" id="total_cholesterol" step="0.1">
  
    <label>Triglycerides mmol/L</label>
    <input type="number" id="triglycerides" step="0.1">
  
    <label>HDL-C mmol/L</label>
    <input type="number" id="hdl" step="0.1">
  
    <label>LDL-C mmol/L optional</label>
    <input type="number" id="ldl" step="0.1">
  
    <button onclick="classifyBiochemistry()">Classify from biochemistry</button>
  </section>

  <section>
    <h2>Result</h2>
    <pre id="resultBox"></pre>
  </section>

  <section>
    <h2>Save confirmed label</h2>

    <select id="confirmed_classification">
      <option>Normal</option>
      <option>Type I</option>
      <option>Type IIa</option>
      <option>Type IIb</option>
      <option>Type III</option>
      <option>Type IV</option>
      <option>Type V</option>
      <option>Lipoprotein X suspected</option>
      <option>Poor quality / repeat recommended</option>
      <option>Unclassified</option>
    </select>

    <textarea id="comments" placeholder="Comments"></textarea>
    <button onclick="saveLabel()">Save label</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
